<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>غرفة الدردشة</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding-bottom: 0;
            background: var(--background);
        }

        /* Room Chat Header */
        .chat-room-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .chat-room-back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .chat-room-back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-room-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-room-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-room-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-room-name {
            color: white;
            font-size: 16px;
            font-weight: 700;
        }

        .chat-room-status {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        /* Three Dots Menu */
        .chat-room-menu-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .chat-room-menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-room-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border);
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1001;
            overflow: hidden;
        }

        .chat-room-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .chat-room-dropdown-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text);
            font-size: 14px;
        }

        .chat-room-dropdown-item:hover {
            background: var(--surface-alt);
        }

        .chat-room-dropdown-item.leave {
            color: var(--error);
        }

        .chat-room-dropdown-item.info {
            color: var(--info);
        }

        /* Members List Modal */
        .members-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 9998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .members-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .members-modal {
            background: var(--surface);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 70vh;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border);
        }

        .members-modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .members-modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .members-modal-close {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
        }

        .members-modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .members-modal-body {
            padding: 16px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .member-item:hover {
            background: var(--surface-alt);
        }

        .member-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--surface-alt);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-avatar .avatar-placeholder {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .member-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .member-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .member-badge.owner {
            background: rgba(217, 119, 6, 0.1);
            color: var(--warning);
        }

        /* Chat Container */
        .chat-room-container {
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
        }

        .chat-room-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-room-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-room-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-room-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .chat-room-message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .chat-room-message.sent {
            align-self: flex-end;
        }

        .chat-room-message.received {
            align-self: flex-start;
        }

        .chat-room-sender-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .chat-room-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .chat-room-message.sent .chat-room-bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-bottom-left-radius: 4px;
        }

        .chat-room-message.received .chat-room-bubble {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
        }

        .chat-room-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
        }

        .chat-room-message.sent .chat-room-time {
            text-align: left;
        }

        .chat-room-message.received .chat-room-time {
            text-align: right;
        }

        .chat-room-date-separator {
            text-align: center;
            padding: 6px 12px;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--surface-alt);
            border-radius: 12px;
            align-self: center;
            margin: 8px 0;
        }

        .chat-room-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .chat-room-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Chat Input */
        .chat-room-input-area {
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-room-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 24px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .chat-room-input:focus {
            border-color: var(--primary);
        }

        .chat-room-send-btn {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .chat-room-send-btn:hover {
            background: var(--primary-light);
        }

        /* Dropdown Overlay */
        .chat-room-dropdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: none;
        }

        .chat-room-dropdown-overlay.show {
            display: block;
        }

        /* Room Info Card */
        .room-info-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            margin: 12px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .room-info-card-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .room-info-card-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .room-info-card-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-light);
        }

        .room-info-card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* System Message */
        .system-message {
            text-align: center;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--surface-alt);
            border-radius: 20px;
            align-self: center;
            margin: 8px 0;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        const firebaseConfig = { apiKey: "AIzaSyDVP5IRHetBo7JDSRLteQOFX4fhsts3ur0", authDomain: "chat-94032.firebaseapp.com", projectId: "chat-94032", storageBucket: "chat-94032.firebasestorage.app", messagingSenderId: "920803161623", appId: "1:920803161623:web:a2995a99c07b42af1d0e52" };
        const app = initializeApp(firebaseConfig);
        window.firebaseApps = [app];
    </script>
</head>
<body>
    <!-- Dropdown Overlay -->
    <div class="chat-room-dropdown-overlay" id="dropdownOverlay" onclick="closeDropdown()"></div>

        <!-- Members Modal -->
    <div class="members-modal-overlay" id="membersModal">
        <div class="members-modal">
            <div class="members-modal-header">
                <div class="members-modal-title">أعضاء الغرفة (<span id="membersCount">0</span>)</div>
                <button class="members-modal-close" onclick="closeMembersModal()">✕</button>
            </div>
            <div class="members-modal-body" id="membersList">
                <!-- Members will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Join Requests Modal -->
    <div class="members-modal-overlay" id="joinRequestsModal">
        <div class="members-modal">
            <div class="members-modal-header" style="background: linear-gradient(135deg, var(--warning), #f59e0b);">
                <div class="members-modal-title">طلبات الانضمام (<span id="joinRequestsCount">0</span>)</div>
                <button class="members-modal-close" onclick="closeJoinRequestsModal()">✕</button>
            </div>
            <div class="members-modal-body" id="joinRequestsList" style="max-height: 60vh;">
                <!-- Join requests will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="chat-room-header">
        <a href="chat.html" class="chat-room-back-btn">←</a>
        <div class="chat-room-info" onclick="showMembersModal()">
            <div class="chat-room-avatar" id="roomAvatar">
                <span style="font-size: 20px;">👥</span>
            </div>
            <div>
                <div class="chat-room-name" id="roomName">...</div>
                <div class="chat-room-status" id="roomStatus">...</div>
            </div>
        </div>
        <button class="chat-room-menu-btn" onclick="toggleDropdown()">⋮</button>
        
        // Dropdown Menu -->
        <div class="chat-room-dropdown" id="menuDropdown">
            <div class="chat-room-dropdown-item" onclick="showJoinRequestsModal(); closeDropdown();" id="joinRequestsMenuItem" style="display: none;">
                <span>📩</span>
                <span>طلبات الانضمام</span>
            </div>
            <div class="chat-room-dropdown-item info" onclick="showMembersModal(); closeDropdown();">
                <span>👥</span>
                <span>عرض الأعضاء</span>
            </div>
            <div class="chat-room-dropdown-item" onclick="shareRoom(); closeDropdown();">
                <span>📤</span>
                <span>مشاركة الغرفة</span>
            </div>
            <div class="chat-room-dropdown-item leave" onclick="leaveRoom()">
                <span>🚪</span>
                <span>مغادرة الغرفة</span>
            </div>
        </div>
    </header>

    <!-- Chat Container -->
    <div class="chat-room-container">
        <div class="chat-room-messages" id="messagesContainer">
            <div class="chat-room-empty" id="emptyMessage">
                <div class="chat-room-empty-icon">💬</div>
                <div>ابدأ المحادثة في الغرفة!</div>
            </div>
        </div>

        <div class="chat-room-input-area">
            <input type="text" class="chat-room-input" id="messageInput" placeholder="اكتب رسالتك في الغرفة..." onkeypress="handleMessageKeyPress(event)">
            <button class="chat-room-send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script type="module">
        import { getFirestore, collection, onSnapshot, query, orderBy, where, getDocs, addDoc, serverTimestamp, doc, updateDoc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const db = getFirestore(window.firebaseApps[0]);
        const auth = getAuth(window.firebaseApps[0]);

        let currentUser = null;
        let currentUserData = null;
        let roomId = null;
        let roomData = null;
        let messagesUnsubscribe = null;
        let roomMembers = [];

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        roomId = urlParams.get('room');

        // Initialize
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                await loadCurrentUserData();
                if (roomId) {
                    await loadRoomInfo();
                    loadMessages();
                } else {
                    showToast('الغرفة غير موجودة', 'error');
                    setTimeout(() => {
                        window.location.href = 'chat.html';
                    }, 1500);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // Load current user data
        async function loadCurrentUserData() {
            try {
                const q = query(collection(db, 'users'), where('uid', '==', currentUser.uid));
                const snapshot = await getDocs(q);
                snapshot.forEach(doc => {
                    currentUserData = { id: doc.id, ...doc.data() };
                });
            } catch (error) {
                console.error("Error loading user data:", error);
            }
        }

        // Load room info
        async function loadRoomInfo() {
            if (!roomId) return;

            try {
                const roomDoc = await getDoc(doc(db, 'chatRooms', roomId));
                
                if (!roomDoc.exists()) {
                    showToast('الغرفة غير موجودة', 'error');
                    setTimeout(() => {
                        window.location.href = 'chat.html';
                    }, 1500);
                    return;
                }

                roomData = { id: roomDoc.id, ...roomDoc.data() };
                
                // Check if user is a member
                const members = roomData.members || [];
                if (!members.includes(currentUser.uid)) {
                    showToast('أنت لست عضواً في هذه الغرفة', 'error');
                    setTimeout(() => {
                        window.location.href = 'chat.html';
                    }, 1500);
                    return;
                }

                // Update UI
                const avatarEl = document.getElementById('roomAvatar');
                const nameEl = document.getElementById('roomName');
                const statusEl = document.getElementById('roomStatus');

                if (roomData.image && roomData.image.length > 0) {
                    avatarEl.innerHTML = `<img src="${roomData.image}" alt="${roomData.name}">`;
                } else {
                    avatarEl.innerHTML = roomData.type === 'private' ? '<span style="font-size: 20px;">🔐</span>' : '<span style="font-size: 20px;">👥</span>';
                }

                nameEl.textContent = roomData.name || 'غرفة دردشة';
                
                const memberCount = members.length;
                const roomType = roomData.type === 'private' ? 'خاصة' : 'عام';
                statusEl.textContent = `${memberCount} عضو • ${roomType}`;

                // Load room members
                await loadRoomMembers();
                
                // Check if current user is room owner and show join requests option
                if (roomData.createdBy === currentUser.uid) {
                    document.getElementById('joinRequestsMenuItem').style.display = 'flex';
                    checkAndShowJoinRequestsBadge();
                }

            } catch (error) {
                console.error("Error loading room info:", error);
                showToast('خطأ في تحميل معلومات الغرفة', 'error');
            }
        }

        // Load room members
        async function loadRoomMembers() {
            if (!roomData || !roomData.members) return;

            roomMembers = [];
            const membersList = document.getElementById('membersList');
            const membersCount = document.getElementById('membersCount');
            
            membersCount.textContent = roomData.members.length;

            let html = '';
            
            for (const memberId of roomData.members) {
                try {
                    const q = query(collection(db, 'users'), where('uid', '==', memberId));
                    const snapshot = await getDocs(q);
                    
                    if (!snapshot.empty) {
                        snapshot.forEach(doc => {
                            const userData = doc.data();
                            const isOwner = roomData.createdBy === memberId;
                            const initials = userData.fullName ? userData.fullName.split(' ').map(n => n[0]).join('').substring(0, 2) : '?';
                            const avatarHtml = userData.avatar ? 
                                `<img src="${userData.avatar}" alt="${userData.fullName}">` :
                                `<span class="avatar-placeholder">${initials}</span>`;
                            
                            html += `<div class="member-item">
                                <div class="member-avatar">${avatarHtml}</div>
                                <div class="member-info">
                                    <div class="member-name">${userData.fullName || 'مستخدم'}</div>
                                    <div class="member-status">@${userData.username || 'user'}</div>
                                </div>
                                ${isOwner ? '<span class="member-badge owner">مدير</span>' : ''}
                            </div>`;
                        });
                    }
                } catch (error) {
                    console.error("Error loading member:", error);
                }
            }

            if (!html) {
                html = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">لا يوجد أعضاء</div></div>';
            }

            membersList.innerHTML = html;
        }

        // Load messages
        function loadMessages() {
            if (!roomId || !currentUser) return;

            const container = document.getElementById('messagesContainer');

            if (messagesUnsubscribe) {
                messagesUnsubscribe();
            }

            const q = query(
                collection(db, 'chatRooms', roomId, 'messages'), 
                orderBy('createdAt', 'asc')
            );

            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                let html = '';
                let hasMessages = false;
                let lastDate = '';

                snapshot.forEach((doc) => {
                    hasMessages = true;
                    const msg = doc.data();
                    const messageDate = msg.createdAt ? msg.createdAt.toDate().toLocaleDateString('ar-SA') : '';

                    if (messageDate !== lastDate) {
                        html += `<div class="chat-room-date-separator">${formatMessageDate(msg.createdAt)}</div>`;
                        lastDate = messageDate;
                    }

                    const isSent = msg.senderId === currentUser.uid;
                    const time = msg.createdAt ? msg.createdAt.toDate().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' }) : '';
                    
                    // Get sender avatar
                    const senderAvatar = msg.senderAvatar || '';
                    const initials = msg.senderName ? msg.senderName.split(' ').map(n => n[0]).join('').substring(0, 2) : '?';
                    const avatarHtml = senderAvatar ? 
                        `<img src="${senderAvatar}" alt="${msg.senderName}">` :
                        `<span style="font-size: 14px; font-weight: 700; color: var(--primary);">${initials}</span>`;
                    
                    // Get likes count and check if user liked
                    const likes = msg.likes || [];
                    const likesCount = likes.length;
                    const isLiked = likes.includes(currentUser.uid);
                    
                    // Get comments
                    const comments = msg.comments || [];
                    const commentsCount = comments.length;
                    
                    // Check if user can edit/delete
                    const canModify = isSent || roomData?.createdBy === currentUser.uid;
                    
                    // Build comments HTML with edit/delete buttons
                    let commentsHtml = '';
                    if (comments.length > 0) {
                        commentsHtml = `<div id="comment-section-${doc.id}" style="display: none; margin-top: 8px; padding: 8px; background: var(--surface-alt); border-radius: 8px;">
                            ${comments.map(comment => {
                                const canEditComment = comment.senderId === currentUser.uid;
                                return `
                                    <div style="margin-bottom: 8px;">
                                        <div style="display: flex; align-items: flex-start; gap: 8px; padding: 8px; background: var(--surface); border-radius: 8px; position: relative;">
                                            <div style="width: 28px; height: 28px; border-radius: 50%; overflow: hidden; background: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                                ${comment.senderAvatar ? 
                                                    `<img src="${comment.senderAvatar}" style="width:100%;height:100%;object-fit:cover;">` :
                                                    `<span style="font-size:11px;font-weight:700;color:white;">${(comment.senderName || '?').charAt(0)}</span>`
                                                }
                                            </div>
                                            <div style="flex: 1; min-width: 0;">
                                                <div style="font-size: 11px; font-weight: 700; color: var(--primary);">${escapeHtml(comment.senderName)}</div>

        // Like comment
        window.likeComment = async function(messageId, commentId, currentLikes) {

            const userId = currentUser.uid;

                const messageData = messageDoc.data();
                const comments = messageData.comments || [];
                const commentIndex = comments.findIndex(c => c.id === commentId);
                
                if (commentIndex !== -1) {
                    let likes = comments[commentIndex].likes || [];
                    
                    if (likes.includes(userId)) {

                return;
            }

            if (!confirm('هل أنت متأكد من حذف هذا التعليق؟')) return;

            if (messageDoc.exists()) {

                let comments = messageData.comments || [];

        // Load join requests for this room
        let joinRequestsUnsubscribe = null;

        async function loadJoinRequests() {
            const container = document.getElementById('joinRequestsList');
            const countEl = document.getElementById('joinRequestsCount');
            
            if (joinRequestsUnsubscribe) {
                joinRequestsUnsubscribe();
            }

            const q = query(
                collection(db, 'roomJoinRequests'),
                where('roomId', '==', roomId),
                where('status', '==', 'pending')
            );

            joinRequestsUnsubscribe = onSnapshot(q, async (snapshot) => {
                const requests = [];
                snapshot.forEach(doc => {
                    requests.push({ id: doc.id, ...doc.data() });
                });

                countEl.textContent = requests.length;

                if (requests.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">لا توجد طلبات انضمام</div></div>';
                    return;
                }

                let html = '';
                for (const request of requests) {
                    const initials = request.userName ? request.userName.split(' ').map(n => n[0]).join('').substring(0, 2) : '؟';
                    const avatarHtml = request.userAvatar ? 
                        `<img src="${request.userAvatar}" alt="${request.userName}">` :
                        `<span style="font-size: 18px; font-weight: 700; color: var(--primary);">${initials}</span>`;

                    html += `<div class="member-item">
                        <div class="member-avatar">${avatarHtml}</div>
                        <div class="member-info">
                            <div class="member-name">${request.userName || 'مستخدم'}</div>

                        </div>

                            <button onclick="approveJoinRequest('${request.id}', '${request.userId}', '${encodeURIComponent(request.userName || '')}')" style="padding: 8px 16px; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">✓ موافقة</button>
                            <button onclick="rejectJoinRequest('${request.id}')" style="padding: 8px 16px; background: var(--error); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">✕ رفض</button>
                        </div>
                    </div>`;
                }

                container.innerHTML = html;
            });
        }

        // Approve join request
        window.approveJoinRequest = async function(requestId, userId, userName) {
            try {
                // Update request status
                await updateDoc(doc(db, 'roomJoinRequests', requestId), {
                    status: 'approved',
                    approvedAt: serverTimestamp()
                });

                // Add user to room members
                const roomDoc = await getDoc(doc(db, 'chatRooms', roomId));
                if (roomDoc.exists()) {
                    const room = roomDoc.data();
                    let members = room.members || [];
                    if (!members.includes(userId)) {
                        members.push(userId);
                        await updateDoc(doc(db, 'chatRooms', roomId), { members: members });
                    }
                }

                // Create notification for the user
                await addDoc(collection(db, 'notifications'), {
                    toUid: userId,
                    fromUid: currentUser.uid,
                    fromName: currentUserData?.fullName || 'المستخدم',
                    type: 'room_join_approved',
                    roomId: roomId,
                    roomName: roomData?.name,
                    message: `تم قبول طلب انضمامك للغرفة`,
                    createdAt: serverTimestamp(),
                    read: false
                });

                showToast('تم قبول الطلب بنجاح!');
                loadRoomMembers();
                
            } catch (error) {
                console.error("Error approving request:", error);
                showToast('فشل في قبول الطلب', 'error');
            }
        };

                    where('status', '==', 'pending')
                );
                
                onSnapshot(q, (snapshot) => {
                    const count = snapshot.size;
                    if (count > 0) {
                        // Show notification badge on menu
                        let badge = document.getElementById('joinRequestsBadge');
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.id = 'joinRequestsBadge';
                            badge.style.cssText = 'position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px;';
                            document.querySelector('.chat-room-menu-btn').appendChild(badge);
                        }
                        badge.textContent = count;
                    }
                });
            }
        }

        // Add close join requests modal on overlay click
        document.getElementById('joinRequestsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeJoinRequestsModal();
            }
        });

        // Share room
        window.shareRoom = function() {
            if (!roomData) return;
            
            const shareText = `انضم إلى غرفة "${roomData.name}"\n`;
            const shareUrl = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: roomData.name,
                    text: shareText,
                    url: shareUrl
                });
            } else {
                // Copy to clipboard
                navigator.clipboard.writeText(shareText + shareUrl).then(() => {
                    showToast('تم نسخ رابط الغرفة!');
                }).catch(() => {
                    showToast('فشل نسخ الرابط', 'error');
                });
            }
        };

        // Leave room
        window.leaveRoom = async function() {
            if (!confirm('هل أنت متأكد من مغادرة هذه الغرفة؟')) return;

            try {
                const members = roomData.members || [];
                const newMembers = members.filter(m => m !== currentUser.uid);

                await updateDoc(doc(db, 'chatRooms', roomId), {
                    members: newMembers
                });

                showToast('تم مغادرة الغرفة بنجاح');
                closeDropdown();
                
                setTimeout(() => {
                    window.location.href = 'chat.html';
                }, 1000);

            } catch (error) {
                console.error("Error leaving room:", error);
                showToast('فشل مغادرة الغرفة', 'error');
            }
        };

        // Helper functions
        function formatMessageDate(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate();
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return 'اليوم';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return 'أمس';
            } else {
                return date.toLocaleDateString('ar-SA', { day: 'numeric', month: 'long' });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on overlay click
        document.getElementById('membersModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeMembersModal();
            }
        });

        initTheme();
    </script>
</body>
</html>
